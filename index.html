    <script>
        function scrollToSection() {

        function openYouTube() {
            window.open('https://www.youtube.com/@UttamRealPok/featured', '_blank');
        }

        function sendMessageIndex() {
            const input = document.getElementById('chat-input-index');
            const message = input.value.trim();
            if (message) {
                addMessageIndex('You: ' + message);
                input.value = '';
                fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                })
                .then(response => response.json())
                .then(data => addMessageIndex('AI: ' + data.response))
                .catch(() => addMessageIndex('AI: Sorry, I\'m having trouble, working on it. COMING SOON!'));
            }
        }

        function addMessageIndex(message) {
            const messages = document.getElementById('chat-messages-index');
            const msgDiv = document.createElement('div');
            msgDiv.textContent = message;
            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
